services:
  # PostgreSQL with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bsmart-postgres
    environment:
      POSTGRES_USER: bsmart
      POSTGRES_PASSWORD: bsmart
      POSTGRES_DB: bsmart_alm
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bsmart"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bsmart-network

  # RabbitMQ for event bus
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: bsmart-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5677:5672"   # AMQP
      - "15677:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bsmart-network

  # MinIO for object storage
  minio:
    image: minio/minio:latest
    container_name: bsmart-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bsmart-network

  # Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    container_name: bsmart-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bsmart-network

volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local
  minio_data:
    driver: local
  redis_data:
    driver: local

networks:
  bsmart-network:
    driver: bridge
